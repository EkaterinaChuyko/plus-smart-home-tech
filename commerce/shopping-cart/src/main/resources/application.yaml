server:
  port: 0

spring:
  application:
    name: shopping-cart

  config:
    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server

  datasource:
    url: jdbc:h2:mem:warehouse-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:

    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true
    hostname: localhost
    leaseRenewalIntervalInSeconds: 10