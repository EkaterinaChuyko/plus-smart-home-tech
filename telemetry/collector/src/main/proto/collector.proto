syntax = "proto3";

package telemetry.service.collector;

option java_multiple_files = true;

service Collector {

  rpc CollectHubEvent(HubEvent) returns (CollectorResponse);

  rpc CollectSensorEvent(SensorEvent) returns (CollectorResponse);

}

message HubEvent {
  string hub_id = 1;
  string event_type = 2;
}

message SensorEvent {
  string sensor_id = 1;
  string hub_id = 2;
  string event_type = 3;
}

message CollectorResponse {
  bool success = 1;
  string message = 2;
}
