spring:
  application:
    name: collector

server:
  port: 8080

grpc:
  server:
    port: 59091
    in-process-name: collector-server

kafka:
  bootstrap-servers: localhost:9092
  topics:
    sensors: telemetry.sensors.v1
    hubs: telemetry.hubs.v1

logging:
  level:
    ru.yandex.practicum: DEBUG
    org.apache.kafka: INFO
    org.springframework.web: DEBUG