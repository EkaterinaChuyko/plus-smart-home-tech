spring:
  application:
    name: collector

  config:
    import: "optional:configserver:"

  cloud:
    config:
      discovery:
        enabled: true
        serviceId: config-server

server:
  port: 0

kafka:
  bootstrap-servers: localhost:9092
  topics:
    sensors: telemetry.sensors.v1
    hubs: telemetry.hubs.v1

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: false
    fetch-registry: true